name: CI - React(Node.js) Application

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  # print_context:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - env:
  #         EVENT_CONTEXT: ${{ toJson(github.event) }}
  #       run: |
  #         echo $EVENT_CONTEXT

  build_test_push:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      # 1. Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0 # Fetches full history for better caching/context     

      # 2. setup-node allows to specify a Node.js version for the runner. Using this is recommended to ensure consistent behavior across runners
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # 2. Install dependencies, build and run tests
      - name: npm install, build, and test
        run: |
          npm ci
          npm run build --if-present
          npm test