apiVersion: apps/v1
kind: Deployment
metadata:
  name: pomodoro-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pomodoro-app
  template:
    metadata:
      labels:
        app: pomodoro-app
    spec:
      containers:
        - name: pomodoro-app-container
          image: rockmountain/pomodoro-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name:  pomodoro-app-service
  namespace: default
spec:
  type: NodePort
  selector:
    app:  pomodoro-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30001